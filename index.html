<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VICKY FOOD EMPIRE</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
body{
  font-family: Orbitron;
  background:#050505;
  color:white;
  overflow-x:hidden;
  animation: pageFade 1s ease-in-out;
}

@keyframes pageFade{
  from{opacity:0;transform:scale(1.02);}
  to{opacity:1;transform:scale(1);}
}

/* ===== BACKGROUND ===== */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background: radial-gradient(circle,rgba(212,175,55,0.05) 2px,transparent 2px);
  background-size:70px 70px;
  animation:bgMove 60s linear infinite;
  z-index:-1;
}

@keyframes bgMove{
  0%{transform:translate(0,0);}
  50%{transform:translate(-100px,-100px);}
  100%{transform:translate(0,0);}
}

/* ===== TITLE ===== */
.weird-title{
  font-family:'Rubik Glitch', cursive;
  font-size:40px;
  color:#d4af37;
  text-shadow:0 0 20px rgba(212,175,55,0.7);
  animation: floatText 4s ease-in-out infinite;
}

@media(min-width:768px){
  .weird-title{font-size:65px;}
}

@keyframes floatText{
  0%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
  100%{transform:translateY(0);}
}

/* ===== BUTTON ===== */
.btn{
  background:linear-gradient(135deg,#d4af37,#fff3b0);
  color:black;
  padding:10px 14px;
  border-radius:12px;
  font-weight:bold;
  box-shadow:0 0 10px rgba(212,175,55,0.3);
  animation: glow 2.5s infinite;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px rgba(212,175,55,0.7);
}

@keyframes glow{
  0%{box-shadow:0 0 10px rgba(212,175,55,0.2);}
  50%{box-shadow:0 0 20px rgba(212,175,55,0.6);}
  100%{box-shadow:0 0 10px rgba(212,175,55,0.2);}
}

/* ===== CARD ===== */
.card{
  position:relative;
  transition:0.3s;
  overflow:hidden;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 20px 50px rgba(212,175,55,0.2);
}

.card::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:50%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.1),transparent);
  transition:0.5s;
}

.card:hover::before{
  left:100%;
}

/* ===== MODAL ===== */
.modal{
  animation: popIn 0.4s ease-out;
  background:rgba(20,20,20,0.95);
  border-radius:16px;
  padding:20px;
}

@keyframes popIn{
  from{transform:scale(0.8) translateY(40px);opacity:0;}
  to{transform:scale(1) translateY(0);opacity:1;}
}

</style>
</head>

<body>

<!-- NAV -->
<div class="flex justify-between items-center p-5 border-b border-zinc-800">

<h1 class="weird-title font-semibold">VICKY FOOD EMPIRE</h1>

<div class="flex gap-3">
  <a href="https://wa.me/2347085152972" class="bg-green-500 px-3 py-1 rounded-full text-sm">WhatsApp</a>
  <button onclick="openAdmin()" class="text-xs text-gray-400">Admin</button>
</div>

</div>

<!-- HERO -->
<section class="text-center py-12">
<h1 class="text-4xl md:text-6xl font-bold">
Luxury Catering <span class="text-yellow-400">Experience</span>
</h1>

<p class="text-gray-400 mt-3">Food • Events • Lagos</p>

<div class="mt-6 flex justify-center gap-3">
<button onclick="openFood()" class="btn">🍽️ Order Food</button>
<button onclick="openEvent()" class="border border-yellow-400 px-5 py-2 rounded-xl">
🎉 Book Event
</button>
</div>
</section>

<!-- FOOD MODAL -->
<div id="foodModal" class="hidden fixed inset-0 bg-black/90 p-4 z-50 overflow-auto">
<div class="modal max-w-xl mx-auto">

<h2 class="text-yellow-400 text-xl mb-4">🍽️ Food Menu</h2>

<div id="foodList" class="space-y-3"></div>

<h3 class="mt-4 text-yellow-400">Cart</h3>
<div id="cart" class="text-sm space-y-2"></div>

<p class="mt-2">Total: <span id="total" class="text-yellow-400">₦0</span></p>

<input id="location" placeholder="Location"
class="w-full p-2 mt-3 bg-black rounded-lg">

<textarea id="notes" placeholder="Notes"
class="w-full p-2 mt-2 bg-black rounded-lg"></textarea>

<button onclick="sendFood()" class="btn w-full mt-4">Send WhatsApp</button>

<button onclick="closeFood()" class="text-red-400 w-full mt-2">Close</button>

</div>
</div>

<!-- EVENT MODAL -->
<div id="eventModal" class="hidden fixed inset-0 bg-black/90 p-4 z-50">
<div class="modal max-w-xl mx-auto">

<h2 class="text-yellow-400 text-xl mb-4">🎉 Event Booking</h2>

<select id="etype" class="w-full p-2 bg-black rounded-lg mb-2">
<option>Wedding</option>
<option>Birthday</option>
<option>Corporate</option>
<option>Anniversary</option>
<option>Engagement</option>
<option>Baby Shower</option>
</select>

<input id="edate" type="date" class="w-full p-2 bg-black rounded-lg mb-2">
<input id="eguests" placeholder="Guests" class="w-full p-2 bg-black rounded-lg mb-2">
<input id="elocation" placeholder="Venue" class="w-full p-2 bg-black rounded-lg mb-2">

<textarea id="emenu" placeholder="Menu request"
class="w-full p-2 bg-black rounded-lg"></textarea>

<button onclick="sendEvent()" class="btn w-full mt-4">Send Booking</button>

<button onclick="closeEvent()" class="text-red-400 w-full mt-2">Close</button>

</div>
</div>

<!-- ADMIN -->
<div id="adminPanel" class="hidden fixed inset-0 bg-black z-[999] p-5 overflow-auto">

<div class="flex justify-between mb-4">
<h2 class="text-yellow-400">📊 Admin Dashboard</h2>
<button onclick="closeAdmin()" class="text-red-400">Close</button>
</div>

<div class="grid md:grid-cols-2 gap-4">

<div class="bg-zinc-900 p-3 rounded">
<h3 class="text-yellow-400 mb-2">Food Orders</h3>
<div id="foodOrders"></div>
</div>

<div class="bg-zinc-900 p-3 rounded">
<h3 class="text-yellow-400 mb-2">Events</h3>
<div id="eventOrders"></div>
</div>

</div>
</div>

<!-- FLOAT -->
<a href="https://wa.me/2347085152972"
class="fixed bottom-5 right-5 bg-green-500 w-14 h-14 rounded-full flex items-center justify-center">
💬
</a>

<script>

/* MENU */
const menu=[
{id:1,name:"Jollof Rice & Chicken",price:14000},
{id:2,name:"Jollof Rice & Turkey",price:16500},
{id:3,name:"Yam & Egg Sauce",price:8000},
{id:4,name:"Chicken Pepper Soup",price:9000},
{id:5,name:"Chicken Tacos",price:13000},
{id:6,name:"Chicken & Chips",price:14500},
{id:7,name:"English Breakfast",price:18000},
{id:8,name:"Burger",price:15000}
];

let cart=[];
const WA="2347085152972";

let foodDB=JSON.parse(localStorage.getItem("foodDB")||"[]");
let eventDB=JSON.parse(localStorage.getItem("eventDB")||"[]");

/* LOAD */
function loadFood(){
let box=document.getElementById("foodList");
box.innerHTML="";
menu.forEach(m=>{
box.innerHTML+=`
<div class="flex justify-between bg-black p-2 rounded card">
<span>${m.name} ₦${m.price}</span>
<button onclick="add(${m.id})" class="bg-yellow-400 text-black px-2 rounded">Add</button>
</div>`;
});
}

/* ADD */
function add(id){
let item=menu.find(m=>m.id===id);
cart.push(item);
render();
}

/* CART */
function render(){
let box=document.getElementById("cart");
let total=0;
box.innerHTML="";
cart.forEach(c=>{
total+=c.price;
box.innerHTML+=`<div>${c.name}</div>`;
});
document.getElementById("total").innerText="₦"+total;
}

/* FOOD */
function sendFood(){
if(cart.length==0)return alert("Empty");

let total=cart.reduce((a,b)=>a+b.price,0);

let msg="🍽️ FOOD ORDER%0A%0A";
cart.forEach(c=>msg+=`• ${c.name}%0A`);

msg+=`%0A💰 ₦${total}`;
msg+=`%0A📍 ${location.value}`;
msg+=`%0A📝 ${notes.value}`;

window.open(`https://wa.me/${WA}?text=${msg}`,'_blank');

cart=[];
render();
closeFood();
}

/* EVENT */
function sendEvent(){
let msg="🎉 EVENT%0A%0A";
msg+=`Type:${etype.value}%0A`;
msg+=`Date:${edate.value}%0A`;
msg+=`Guests:${eguests.value}%0A`;
msg+=`Venue:${elocation.value}%0A`;
msg+=`Menu:${emenu.value}`;

window.open(`https://wa.me/${WA}?text=${msg}`,'_blank');
closeEvent();
}

/* ADMIN */
function openAdmin(){
adminPanel.classList.remove("hidden");
renderAdmin();
}

function closeAdmin(){
adminPanel.classList.add("hidden");
}

function renderAdmin(){
foodOrders.innerHTML="";
eventOrders.innerHTML="";

foodDB.forEach(o=>{
foodOrders.innerHTML+=`<div class="p-2 bg-black mb-2">${o.time}</div>`;
});

eventDB.forEach(o=>{
eventOrders.innerHTML+=`<div class="p-2 bg-black mb-2">${o.type}</div>`;
});
}

/* MODALS */
function openFood(){foodModal.classList.remove("hidden");loadFood();}
function closeFood(){foodModal.classList.add("hidden");}
function openEvent(){eventModal.classList.remove("hidden");}
function closeEvent(){eventModal.classList.add("hidden");}

</script>

</body>
</html>
